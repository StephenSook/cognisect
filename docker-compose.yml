services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cognisect
      POSTGRES_USER: cognisect
      POSTGRES_PASSWORD: cognisect
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognisect -d cognisect"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - cognisect-postgres:/var/lib/postgresql/data

volumes:
  cognisect-postgres:
