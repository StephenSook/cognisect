name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.10.9"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22.22.2"
  COGNISECT_TEST_DATABASE_URL: postgresql+psycopg://cognisect:cognisect@localhost:54329/cognisect
  DATABASE_URL: postgresql+psycopg://cognisect:cognisect@localhost:54329/cognisect

jobs:
  hygiene:
    name: Hygiene, secrets, dependencies, and licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan complete Git history for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --frozen
      - run: npm ci
        working-directory: frontend
      - run: npm ci
        working-directory: frontend/tools/openapi-generator
      - run: npm run check:peers
        working-directory: frontend
      - run: uv run python scripts/check_public_repo.py
      - run: uv run python scripts/validate_provenance.py
      - run: uv run python scripts/run_offline_evaluation.py --check
      - run: uv run python scripts/run_model_benchmark.py --check
      - run: uv run python scripts/run_production_stress.py --check
      - run: uv run python scripts/generate_dependency_licenses.py --check
      - run: uv export --frozen --no-hashes --no-dev --no-emit-project | uvx --python 3.12 pip-audit -r /dev/stdin
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend/tools/openapi-generator

  backend-quality:
    name: Backend Ruff and mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run ruff check backend scripts
      - run: uv run mypy backend/src

  backend-tests:
    name: Backend unit, integration, property, and concurrency
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cognisect
          POSTGRES_USER: cognisect
          POSTGRES_PASSWORD: cognisect
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U cognisect -d cognisect"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - run: uv sync --frozen
      - run: uv run pytest backend/tests -q

  frontend:
    name: Frontend lint, types, components, and production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  accessibility-e2e:
    name: Accessibility and Playwright journeys
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cognisect
          POSTGRES_USER: cognisect
          POSTGRES_PASSWORD: cognisect
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U cognisect -d cognisect"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --frozen
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend

  contracts-containers:
    name: OpenAPI, migrations, and container build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cognisect
          POSTGRES_USER: cognisect
          POSTGRES_PASSWORD: cognisect
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U cognisect -d cognisect"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-suffix: ${{ github.job }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv sync --frozen
      - run: npm ci
        working-directory: frontend
      - run: npm ci
        working-directory: frontend/tools/openapi-generator
      - run: uv run pytest backend/tests/test_openapi.py -q
      - run: npm run check:api
        working-directory: frontend
      - run: uv run alembic upgrade head
      - run: uv run alembic check
      - run: uv run alembic downgrade base
      - run: uv run alembic upgrade head
      - run: docker compose config --quiet
      - run: docker build --file backend/Dockerfile --tag cognisect-api:${{ github.sha }} .
